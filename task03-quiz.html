<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuizZone</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1117;
    --card: #161b26;
    --card2: #1c2333;
    --coral: #ff6b6b;
    --mint: #43e8b0;
    --sky: #4ea8f5;
    --yellow: #f5c842;
    --text: #eef2ff;
    --muted: #6b7a99;
    --correct: #43e8b0;
    --wrong: #ff6b6b;
    --border: rgba(255,255,255,0.06);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    position: relative;
    overflow-x: hidden;
  }

  /* Gradient mesh background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 50% 40% at 20% 20%, rgba(255,107,107,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 80% 80%, rgba(67,232,176,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 30% 30% at 70% 20%, rgba(78,168,245,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── SCREEN MANAGEMENT ── */
  .screen { display: none; width: 100%; max-width: 620px; position: relative; z-index: 1; }
  .screen.active { display: block; animation: enterScreen 0.4s cubic-bezier(0.34,1.56,0.64,1) both; }

  @keyframes enterScreen {
    from { opacity: 0; transform: scale(0.94) translateY(16px); }
    to { opacity: 1; transform: none; }
  }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 2.5rem;
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  }

  /* ── HOME SCREEN ── */
  .home-hero {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .logo-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 80px; height: 80px;
    background: linear-gradient(135deg, var(--coral), #ff9e5e);
    border-radius: 24px;
    font-size: 2.2rem;
    margin: 0 auto 1.2rem;
    box-shadow: 0 12px 32px rgba(255,107,107,0.35);
    animation: logoPulse 3s ease-in-out infinite;
  }

  @keyframes logoPulse {
    0%,100% { box-shadow: 0 12px 32px rgba(255,107,107,0.35); }
    50% { box-shadow: 0 12px 48px rgba(255,107,107,0.55); }
  }

  .home-hero h1 {
    font-family: 'Fraunces', serif;
    font-size: 2.6rem;
    font-weight: 900;
    color: var(--text);
    letter-spacing: -0.03em;
    margin-bottom: 0.5rem;
  }

  .home-hero p {
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 500;
  }

  /* Category grid */
  .cat-section-label {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.8rem;
  }

  .cat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.7rem;
    margin-bottom: 1.5rem;
  }

  .cat-btn {
    background: var(--card2);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 1.1rem;
    cursor: pointer;
    text-align: left;
    font-family: 'Nunito', sans-serif;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .cat-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--cat-color, var(--coral)), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .cat-btn:hover { border-color: rgba(255,255,255,0.15); transform: translateY(-2px); }
  .cat-btn:hover::before { opacity: 0.05; }
  .cat-btn.selected { border-color: var(--cat-color, var(--coral)); background: rgba(255,107,107,0.06); }
  .cat-btn.selected::before { opacity: 0.08; }

  .cat-emoji { font-size: 1.6rem; margin-bottom: 0.5rem; display: block; }
  .cat-name { font-size: 0.88rem; font-weight: 700; color: var(--text); display: block; }
  .cat-sub { font-size: 0.72rem; color: var(--muted); font-weight: 500; display: block; margin-top: 0.1rem; }

  /* Difficulty */
  .diff-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .diff-btn {
    flex: 1;
    padding: 0.65rem;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: var(--card2);
    font-family: 'Nunito', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
  }

  .diff-btn:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }
  .diff-btn.selected.easy { border-color: var(--mint); color: var(--mint); background: rgba(67,232,176,0.06); }
  .diff-btn.selected.medium { border-color: var(--yellow); color: var(--yellow); background: rgba(245,200,66,0.06); }
  .diff-btn.selected.hard { border-color: var(--coral); color: var(--coral); background: rgba(255,107,107,0.06); }

  .start-btn {
    width: 100%;
    padding: 1.1rem;
    border-radius: 16px;
    border: none;
    background: linear-gradient(135deg, var(--coral), #ff8c6b);
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: 0.03em;
    box-shadow: 0 8px 24px rgba(255,107,107,0.35);
    transition: all 0.2s;
  }

  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(255,107,107,0.45); }
  .start-btn:active { transform: scale(0.98); }

  /* ── QUIZ SCREEN ── */
  .quiz-top {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .prog-wrap { flex: 1; }

  .prog-meta {
    display: flex;
    justify-content: space-between;
    margin-bottom: 0.5rem;
  }

  .prog-label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .score-tag {
    font-size: 0.78rem;
    font-weight: 800;
    color: var(--mint);
    background: rgba(67,232,176,0.1);
    border: 1px solid rgba(67,232,176,0.2);
    padding: 0.25rem 0.7rem;
    border-radius: 99px;
  }

  .prog-bar {
    height: 8px;
    background: rgba(255,255,255,0.06);
    border-radius: 99px;
    overflow: hidden;
  }

  .prog-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--coral), var(--yellow));
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }

  /* Timer circle */
  .timer-circle {
    position: relative;
    width: 56px; height: 56px;
    flex-shrink: 0;
  }

  .timer-circle svg {
    transform: rotate(-90deg);
    width: 56px; height: 56px;
  }

  .t-track { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 4; }
  .t-arc {
    fill: none;
    stroke: var(--sky);
    stroke-width: 4;
    stroke-linecap: round;
    stroke-dasharray: 153;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear, stroke 0.3s;
  }

  .timer-num {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    font-weight: 800;
    color: var(--text);
  }

  /* Type badge */
  .type-badge {
    display: inline-block;
    font-size: 0.65rem;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.25rem 0.7rem;
    border-radius: 6px;
    margin-bottom: 1rem;
  }

  .type-badge.mcq { background: rgba(78,168,245,0.12); color: var(--sky); }
  .type-badge.multi { background: rgba(245,200,66,0.12); color: var(--yellow); }
  .type-badge.fill { background: rgba(67,232,176,0.12); color: var(--mint); }

  .question-text {
    font-family: 'Fraunces', serif;
    font-size: clamp(1.1rem, 3vw, 1.4rem);
    font-weight: 700;
    color: var(--text);
    line-height: 1.45;
    margin-bottom: 0.5rem;
    letter-spacing: -0.01em;
  }

  .multi-hint {
    display: none;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.75rem;
    color: var(--yellow);
    font-weight: 600;
    margin-bottom: 1.2rem;
  }

  /* Options */
  .options-grid {
    display: flex;
    flex-direction: column;
    gap: 0.65rem;
    margin-bottom: 1rem;
  }

  .opt-btn {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.2rem;
    background: var(--card2);
    border: 2px solid var(--border);
    border-radius: 14px;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 0.92rem;
    font-weight: 600;
    color: var(--text);
    text-align: left;
    transition: all 0.2s;
    width: 100%;
  }

  .opt-btn:hover:not(:disabled) { border-color: rgba(255,255,255,0.2); transform: translateX(4px); }
  .opt-btn:disabled { cursor: default; }

  .opt-letter {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 800;
    flex-shrink: 0;
    color: var(--muted);
    transition: all 0.2s;
  }

  .opt-btn:hover:not(:disabled) .opt-letter { background: rgba(255,255,255,0.1); color: var(--text); }

  .opt-btn.selected { border-color: var(--sky); background: rgba(78,168,245,0.08); }
  .opt-btn.selected .opt-letter { background: var(--sky); color: #000; border-color: var(--sky); }

  .opt-btn.correct { border-color: var(--correct); background: rgba(67,232,176,0.08); }
  .opt-btn.correct .opt-letter { background: var(--correct); color: #000; border-color: var(--correct); }

  .opt-btn.wrong { border-color: var(--wrong); background: rgba(255,107,107,0.08); }
  .opt-btn.wrong .opt-letter { background: var(--wrong); color: #fff; border-color: var(--wrong); }

  /* Fill input */
  .fill-wrap { margin-bottom: 1rem; display: none; }

  .fill-input {
    width: 100%;
    padding: 1rem 1.2rem;
    background: var(--card2);
    border: 2px solid var(--border);
    border-radius: 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .fill-input:focus { border-color: rgba(255,255,255,0.2); }
  .fill-input.correct { border-color: var(--correct); }
  .fill-input.wrong { border-color: var(--wrong); }

  .submit-fill {
    width: 100%;
    padding: 0.85rem;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--mint), #2cd4a0);
    color: #000;
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 0.6rem;
  }

  .submit-fill:hover { transform: translateY(-1px); }

  /* Feedback */
  .feedback-box {
    padding: 0.9rem 1.2rem;
    border-radius: 12px;
    font-size: 0.88rem;
    font-weight: 700;
    display: none;
    margin-bottom: 1rem;
  }

  .feedback-box.correct-fb { display: block; background: rgba(67,232,176,0.1); border: 1px solid rgba(67,232,176,0.25); color: var(--mint); }
  .feedback-box.wrong-fb { display: block; background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.25); color: var(--coral); }

  .next-btn {
    width: 100%;
    padding: 1rem;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, var(--sky), #3d8fe0);
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    font-weight: 800;
    cursor: pointer;
    display: none;
    transition: all 0.2s;
  }

  .next-btn.visible { display: block; animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  .next-btn:hover { transform: translateY(-2px); }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: none; }
  }

  /* ── RESULTS SCREEN ── */
  .results-header { text-align: center; margin-bottom: 2rem; }

  .result-ring {
    position: relative;
    width: 130px; height: 130px;
    margin: 0 auto 1.5rem;
  }

  .result-ring svg { transform: rotate(-90deg); width: 130px; height: 130px; }
  .r-track { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 8; }
  .r-fill {
    fill: none;
    stroke: url(#rGrad);
    stroke-width: 8;
    stroke-linecap: round;
    stroke-dasharray: 345;
    stroke-dashoffset: 345;
    transition: stroke-dashoffset 1.2s cubic-bezier(0.34,1.56,0.64,1);
  }

  .result-pct {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .pct-num {
    font-family: 'Fraunces', serif;
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--text);
    line-height: 1;
  }

  .pct-label { font-size: 0.65rem; font-weight: 700; color: var(--muted); letter-spacing: 0.12em; }

  .result-title {
    font-family: 'Fraunces', serif;
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--text);
    letter-spacing: -0.02em;
    margin-bottom: 0.4rem;
  }

  .result-sub { font-size: 0.88rem; color: var(--muted); font-weight: 500; }

  .result-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.8rem;
    margin-bottom: 1.5rem;
  }

  .r-stat {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.1rem 0.8rem;
    text-align: center;
  }

  .r-stat-val {
    font-family: 'Fraunces', serif;
    font-size: 1.6rem;
    font-weight: 900;
    line-height: 1;
    margin-bottom: 0.3rem;
  }

  .r-stat-val.c { color: var(--mint); }
  .r-stat-val.w { color: var(--coral); }
  .r-stat-val.t { color: var(--sky); }

  .r-stat-lbl { font-size: 0.68rem; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }

  .retry-btn {
    width: 100%;
    padding: 1.1rem;
    border-radius: 16px;
    border: none;
    background: linear-gradient(135deg, var(--coral), #ff8c6b);
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(255,107,107,0.3);
    transition: all 0.2s;
  }

  .retry-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(255,107,107,0.45); }

  @media (max-width: 480px) {
    .card { padding: 1.8rem 1.4rem; }
    .cat-grid { grid-template-columns: 1fr 1fr; }
    .result-stats { grid-template-columns: repeat(3,1fr); }
  }
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="homeScreen">
  <div class="card">
    <div class="home-hero">
      <div class="logo-badge">🧠</div>
      <h1>QuizZone</h1>
      <p>Test your knowledge across topics</p>
    </div>

    <div class="cat-section-label">Choose Category</div>
    <div class="cat-grid">
      <button class="cat-btn selected" style="--cat-color:#4ea8f5" onclick="selectCat(this,'science')">
        <span class="cat-emoji">🔬</span>
        <span class="cat-name">Science</span>
        <span class="cat-sub">5 questions</span>
      </button>
      <button class="cat-btn" style="--cat-color:#f5c842" onclick="selectCat(this,'history')">
        <span class="cat-emoji">📜</span>
        <span class="cat-name">History</span>
        <span class="cat-sub">5 questions</span>
      </button>
      <button class="cat-btn" style="--cat-color:#43e8b0" onclick="selectCat(this,'tech')">
        <span class="cat-emoji">💻</span>
        <span class="cat-name">Technology</span>
        <span class="cat-sub">5 questions</span>
      </button>
      <button class="cat-btn" style="--cat-color:#ff6b6b" onclick="selectCat(this,'nature')">
        <span class="cat-emoji">🌿</span>
        <span class="cat-name">Nature</span>
        <span class="cat-sub">5 questions</span>
      </button>
    </div>

    <div class="cat-section-label">Difficulty</div>
    <div class="diff-row">
      <button class="diff-btn easy selected" onclick="selectDiff(this,'easy')">Easy</button>
      <button class="diff-btn medium" onclick="selectDiff(this,'medium')">Medium</button>
      <button class="diff-btn hard" onclick="selectDiff(this,'hard')">Hard</button>
    </div>

    <button class="start-btn" onclick="startQuiz()">Start Quiz →</button>
  </div>
</div>

<!-- QUIZ -->
<div class="screen" id="quizScreen">
  <div class="card">
    <div class="quiz-top">
      <div class="prog-wrap">
        <div class="prog-meta">
          <span class="prog-label">Question <span id="qNum">1</span> / <span id="qTotal">5</span></span>
          <span class="score-tag">⚡ <span id="scoreDisplay">0</span> pts</span>
        </div>
        <div class="prog-bar"><div class="prog-fill" id="progressFill" style="width:0%"></div></div>
      </div>
      <div class="timer-circle">
        <svg viewBox="0 0 56 56">
          <defs>
            <linearGradient id="tGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#4ea8f5"/>
              <stop offset="100%" stop-color="#43e8b0"/>
            </linearGradient>
          </defs>
          <circle class="t-track" cx="28" cy="28" r="24"/>
          <circle class="t-arc" cx="28" cy="28" r="24" id="timerArc"/>
        </svg>
        <div class="timer-num" id="timerText">30</div>
      </div>
    </div>

    <div class="type-badge mcq" id="qTypeBadge">Single Choice</div>
    <div class="question-text" id="questionText">Loading question...</div>
    <div class="multi-hint" id="multiHint">☑ Select all that apply</div>

    <div class="options-grid" id="optionsContainer"></div>
    <div class="fill-wrap" id="fillContainer">
      <input class="fill-input" id="fillInput" placeholder="Type your answer..." autocomplete="off">
      <button class="submit-fill" id="submitFillBtn" onclick="checkFill()">Submit Answer</button>
    </div>

    <div class="feedback-box" id="feedbackBox"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button>
  </div>
</div>

<!-- RESULTS -->
<div class="screen" id="resultsScreen">
  <div class="card">
    <div class="results-header">
      <div class="result-ring">
        <svg viewBox="0 0 130 130">
          <defs>
            <linearGradient id="rGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#ff6b6b"/>
              <stop offset="50%" stop-color="#f5c842"/>
              <stop offset="100%" stop-color="#43e8b0"/>
            </linearGradient>
          </defs>
          <circle class="r-track" cx="65" cy="65" r="55"/>
          <circle class="r-fill" cx="65" cy="65" r="55" id="rFill"/>
        </svg>
        <div class="result-pct">
          <div class="pct-num" id="resultPct">0%</div>
          <div class="pct-label">Score</div>
        </div>
      </div>
      <div class="result-title" id="resultTitle">Well Done!</div>
      <div class="result-sub" id="resultSub">Here's how you did</div>
    </div>

    <div class="result-stats">
      <div class="r-stat"><div class="r-stat-val c" id="correctCount">0</div><div class="r-stat-lbl">Correct</div></div>
      <div class="r-stat"><div class="r-stat-val w" id="wrongCount">0</div><div class="r-stat-lbl">Wrong</div></div>
      <div class="r-stat"><div class="r-stat-val t" id="timeUsedStat">0s</div><div class="r-stat-lbl">Avg Time</div></div>
    </div>

    <button class="retry-btn" onclick="goHome()">Try Again →</button>
  </div>
</div>

<script>
  const allQuestions = {
    science:[
      {q:"What is the chemical symbol for gold?",type:"mcq",opts:["Au","Ag","Fe","Cu"],ans:0},
      {q:"What is the speed of light?",type:"mcq",opts:["299,792 km/s","150,000 km/s","1,080,000 km/h","299,792 m/s"],ans:0},
      {q:"Which organelles are responsible for energy production in cells?",type:"multi",opts:["Mitochondria","Nucleus","Ribosome","Chloroplast"],ans:[0,3]},
      {q:"What planet is known as the Red Planet?",type:"fill",ans:["mars","Mars"]},
      {q:"DNA stands for Deoxyribonucleic _____.",type:"fill",ans:["acid","Acid"]},
    ],
    history:[
      {q:"In what year did World War II end?",type:"mcq",opts:["1943","1944","1945","1946"],ans:2},
      {q:"Who was the first President of the United States?",type:"fill",ans:["washington","George Washington","Washington"]},
      {q:"Which ancient wonder was located in Alexandria?",type:"mcq",opts:["Colossus of Rhodes","Lighthouse","Hanging Gardens","Statue of Zeus"],ans:1},
      {q:"Which events occurred in 1969?",type:"multi",opts:["Moon landing","Woodstock","Berlin Wall fall","Concorde first flight"],ans:[0,1,3]},
      {q:"The Renaissance began in which country?",type:"fill",ans:["italy","Italy"]},
    ],
    tech:[
      {q:"What does HTML stand for?",type:"mcq",opts:["HyperText Markup Language","HighText Machine Language","Hyperlink Text Markup Language","HyperText Machine Language"],ans:0},
      {q:"Who founded Apple Computer?",type:"multi",opts:["Steve Jobs","Steve Wozniak","Bill Gates","Ronald Wayne"],ans:[0,1,3]},
      {q:"What is the binary representation of the number 10?",type:"mcq",opts:["1000","1010","0110","1100"],ans:1},
      {q:"Which language is primarily used for iOS development?",type:"fill",ans:["swift","Swift"]},
      {q:"What year was the first iPhone released?",type:"fill",ans:["2007"]},
    ],
    nature:[
      {q:"What is the largest ocean on Earth?",type:"mcq",opts:["Atlantic","Indian","Arctic","Pacific"],ans:3},
      {q:"Which gas do plants absorb during photosynthesis?",type:"fill",ans:["carbon dioxide","co2","CO2"]},
      {q:"Which of these are mammals?",type:"multi",opts:["Dolphin","Shark","Bat","Eagle"],ans:[0,2]},
      {q:"How many legs does a spider have?",type:"mcq",opts:["6","8","10","12"],ans:1},
      {q:"What is the tallest mountain on Earth?",type:"fill",ans:["everest","mount everest","Everest","Mount Everest"]},
    ]
  };

  let currentCat = 'science', currentDiff = 'easy';
  let questions = [], qIndex = 0, score = 0, correctCount = 0, wrongCount = 0, totalTimeUsed = 0;
  let timeLeft = 30, timerInterval = null, answered = false, selectedMulti = [];

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function selectCat(btn, cat) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    currentCat = cat;
  }

  function selectDiff(btn, diff) {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    btn.classList.add(diff);
    currentDiff = diff;
  }

  function startQuiz() {
    questions = [...allQuestions[currentCat]].sort(() => Math.random() - 0.5);
    qIndex = 0; score = 0; correctCount = 0; wrongCount = 0; totalTimeUsed = 0;
    document.getElementById('qTotal').textContent = questions.length;
    showScreen('quizScreen');
    loadQuestion();
  }

  function loadQuestion() {
    clearInterval(timerInterval);
    answered = false; selectedMulti = [];
    const q = questions[qIndex];
    const limit = currentDiff === 'easy' ? 30 : currentDiff === 'medium' ? 20 : 12;
    timeLeft = limit;
    document.getElementById('qNum').textContent = qIndex + 1;
    document.getElementById('progressFill').style.width = `${(qIndex / questions.length) * 100}%`;
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('questionText').textContent = q.q;
    document.getElementById('feedbackBox').className = 'feedback-box';
    document.getElementById('nextBtn').classList.remove('visible');

    const badge = document.getElementById('qTypeBadge');
    if (q.type === 'mcq') { badge.textContent = 'Single Choice'; badge.className = 'type-badge mcq'; }
    else if (q.type === 'multi') { badge.textContent = 'Multi Select'; badge.className = 'type-badge multi'; }
    else { badge.textContent = 'Fill in the Blank'; badge.className = 'type-badge fill'; }

    document.getElementById('multiHint').style.display = q.type === 'multi' ? 'flex' : 'none';
    document.getElementById('fillContainer').style.display = q.type === 'fill' ? 'block' : 'none';
    document.getElementById('optionsContainer').style.display = q.type !== 'fill' ? 'flex' : 'none';

    const subBtn = document.getElementById('submitMultiBtn');
    if (subBtn) subBtn.remove();

    if (q.type !== 'fill') {
      const container = document.getElementById('optionsContainer');
      container.innerHTML = '';
      ['A','B','C','D'].forEach((letter, i) => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.innerHTML = `<span class="opt-letter">${letter}</span>${q.opts[i]}`;
        btn.onclick = q.type === 'mcq' ? () => checkMcq(btn, i) : () => toggleMulti(btn, i);
        container.appendChild(btn);
      });
      if (q.type === 'multi') {
        const sub = document.createElement('button');
        sub.id = 'submitMultiBtn';
        sub.className = 'submit-fill';
        sub.textContent = 'Submit Answers';
        sub.onclick = checkMulti;
        container.after(sub);
      }
    } else {
      const fi = document.getElementById('fillInput');
      fi.value = ''; fi.className = 'fill-input'; fi.disabled = false;
      document.getElementById('submitFillBtn').style.display = 'block';
    }
    startTimer(limit);
  }

  function startTimer(limit) {
    const arc = document.getElementById('timerArc');
    const txt = document.getElementById('timerText');
    const circ = 153;
    txt.textContent = limit;
    arc.style.strokeDashoffset = 0;
    arc.style.stroke = 'url(#tGrad)';
    timerInterval = setInterval(() => {
      timeLeft--;
      txt.textContent = timeLeft;
      arc.style.strokeDashoffset = circ * (1 - timeLeft / limit);
      if (timeLeft <= 5) arc.style.stroke = 'var(--coral)';
      if (timeLeft <= 0) { clearInterval(timerInterval); totalTimeUsed += limit; if (!answered) timeOut(); }
    }, 1000);
  }

  function timeOut() {
    answered = true; wrongCount++;
    showFeedback(false, `⏰ Time's up! ${getCorrectText()}`);
    disableOptions();
    document.getElementById('nextBtn').classList.add('visible');
    const s = document.getElementById('submitMultiBtn');
    if (s) s.remove();
    document.getElementById('submitFillBtn').style.display = 'none';
  }

  function checkMcq(btn, idx) {
    if (answered) return;
    answered = true;
    clearInterval(timerInterval);
    totalTimeUsed += (currentDiff === 'easy' ? 30 : currentDiff === 'medium' ? 20 : 12) - timeLeft;
    const q = questions[qIndex];
    disableOptions();
    const btns = document.querySelectorAll('.opt-btn');
    btn.classList.add(idx === q.ans ? 'correct' : 'wrong');
    btns[q.ans].classList.add('correct');
    if (idx === q.ans) {
      const pts = (currentDiff === 'easy' ? 10 : currentDiff === 'medium' ? 15 : 20) + Math.ceil(timeLeft / 5);
      score += pts; correctCount++;
      showFeedback(true, `✓ Correct! +${pts} points`);
    } else { wrongCount++; showFeedback(false, `✗ Wrong! ${getCorrectText()}`); }
    document.getElementById('nextBtn').classList.add('visible');
  }

  function toggleMulti(btn, idx) {
    if (answered) return;
    btn.classList.toggle('selected');
    selectedMulti.includes(idx) ? selectedMulti = selectedMulti.filter(i => i !== idx) : selectedMulti.push(idx);
  }

  function checkMulti() {
    if (answered || selectedMulti.length === 0) return;
    answered = true;
    clearInterval(timerInterval);
    totalTimeUsed += (currentDiff === 'easy' ? 30 : currentDiff === 'medium' ? 20 : 12) - timeLeft;
    const q = questions[qIndex];
    disableOptions();
    document.getElementById('submitMultiBtn')?.remove();
    const btns = document.querySelectorAll('.opt-btn');
    const isCorrect = [...selectedMulti].sort().join(',') === [...q.ans].sort().join(',');
    q.ans.forEach(i => btns[i].classList.add('correct'));
    selectedMulti.forEach(i => { if (!q.ans.includes(i)) btns[i].classList.add('wrong'); });
    if (isCorrect) { const pts = currentDiff === 'easy' ? 15 : currentDiff === 'medium' ? 20 : 25; score += pts; correctCount++; showFeedback(true, `✓ All correct! +${pts} pts`); }
    else { wrongCount++; showFeedback(false, `✗ Not quite right!`); }
    document.getElementById('nextBtn').classList.add('visible');
  }

  function checkFill() {
    if (answered) return;
    const input = document.getElementById('fillInput');
    const val = input.value.trim().toLowerCase();
    if (!val) return;
    answered = true;
    clearInterval(timerInterval);
    totalTimeUsed += (currentDiff === 'easy' ? 30 : currentDiff === 'medium' ? 20 : 12) - timeLeft;
    const q = questions[qIndex];
    document.getElementById('submitFillBtn').style.display = 'none';
    input.disabled = true;
    const isCorrect = q.ans.some(a => val === a.toLowerCase() || val.includes(a.toLowerCase()));
    input.classList.add(isCorrect ? 'correct' : 'wrong');
    if (isCorrect) { const pts = currentDiff === 'easy' ? 10 : currentDiff === 'medium' ? 15 : 20; score += pts; correctCount++; showFeedback(true, `✓ Correct! +${pts} pts`); }
    else { wrongCount++; showFeedback(false, `✗ Wrong! Answer: ${q.ans[0]}`); }
    document.getElementById('nextBtn').classList.add('visible');
  }

  function getCorrectText() {
    const q = questions[qIndex];
    if (q.type === 'mcq') return `Answer: ${q.opts[q.ans]}`;
    if (q.type === 'fill') return `Answer: ${q.ans[0]}`;
    return `Answers: ${q.ans.map(i => q.opts[i]).join(', ')}`;
  }

  function showFeedback(ok, msg) {
    const fb = document.getElementById('feedbackBox');
    fb.textContent = msg;
    fb.className = `feedback-box ${ok ? 'correct-fb' : 'wrong-fb'}`;
  }

  function disableOptions() { document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true); }

  function nextQuestion() {
    qIndex++;
    if (qIndex >= questions.length) showResults();
    else loadQuestion();
  }

  function showResults() {
    clearInterval(timerInterval);
    const pct = Math.round((correctCount / questions.length) * 100);
    document.getElementById('resultPct').textContent = pct + '%';
    document.getElementById('correctCount').textContent = correctCount;
    document.getElementById('wrongCount').textContent = wrongCount;
    document.getElementById('timeUsedStat').textContent = Math.round(totalTimeUsed / questions.length) + 's';
    const entries = [[0,39,'Keep Practicing!','Every attempt makes you smarter.'],[40,59,'Good Effort!','Getting there — try again!'],[60,79,'Well Done!','Solid performance!'],[80,99,'Excellent!','You\'re a quiz master.'],[100,100,'Perfect! 🎉','Flawless victory!']];
    const [,,title,sub] = entries.find(([mn,mx]) => pct >= mn && pct <= mx) || entries[0];
    document.getElementById('resultTitle').textContent = title;
    document.getElementById('resultSub').textContent = sub;
    document.getElementById('progressFill').style.width = '100%';
    showScreen('resultsScreen');
    setTimeout(() => {
      const fill = document.getElementById('rFill');
      fill.style.strokeDashoffset = 345 - (345 * pct / 100);
    }, 200);
  }

  function goHome() { showScreen('homeScreen'); }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('fillContainer').style.display !== 'none' && !answered) checkFill();
    if (e.key === 'Enter' && document.getElementById('nextBtn').classList.contains('visible')) nextQuestion();
  });
</script>
</body>
</html>
