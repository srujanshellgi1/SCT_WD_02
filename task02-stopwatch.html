<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stopwatch</title>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600;700&family=Libre+Baskerville:ital@0;1&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1c1410;
    --surface: #241c16;
    --amber: #f0a030;
    --amber-dim: #a06818;
    --red: #e05540;
    --green: #4caf7a;
    --text: #f5ead8;
    --muted: #8a7060;
    --border: rgba(240,160,48,0.15);
    --glow: rgba(240,160,48,0.2);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Josefin Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 2.5rem 1rem 5rem;
    overflow-x: hidden;
  }

  /* Radial vignette */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 40%, rgba(0,0,0,0.5) 100%);
    pointer-events: none;
  }

  /* Subtle dot grid */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(240,160,48,0.07) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    margin-bottom: 2.5rem;
    position: relative;
    z-index: 1;
  }

  .header-eyebrow {
    font-family: 'Courier Prime', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--amber-dim);
    margin-bottom: 0.5rem;
  }

  header h1 {
    font-family: 'Libre Baskerville', serif;
    font-style: italic;
    font-size: clamp(1.8rem, 4vw, 2.5rem);
    font-weight: 400;
    color: var(--amber);
    letter-spacing: -0.01em;
  }

  /* ── MAIN DIAL PANEL ── */
  .dial-panel {
    position: relative;
    z-index: 1;
    width: min(420px, 94vw);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50%;
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 0 0 8px rgba(240,160,48,0.04),
      0 0 0 16px rgba(240,160,48,0.02),
      0 30px 80px rgba(0,0,0,0.6),
      inset 0 0 60px rgba(0,0,0,0.3);
    margin-bottom: 2.5rem;
  }

  /* Outer ring */
  .dial-ring {
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    border: 1px solid rgba(240,160,48,0.1);
  }

  /* SVG progress arc */
  .arc-svg {
    position: absolute;
    inset: -4px;
    width: calc(100% + 8px);
    height: calc(100% + 8px);
    transform: rotate(-90deg);
    border-radius: 50%;
  }

  .arc-track {
    fill: none;
    stroke: rgba(240,160,48,0.06);
    stroke-width: 3;
  }

  .arc-fill {
    fill: none;
    stroke: var(--amber);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 1000;
    stroke-dashoffset: 1000;
    filter: drop-shadow(0 0 6px var(--amber));
    transition: stroke-dashoffset 0.1s linear;
  }

  /* Tick marks */
  .ticks {
    position: absolute;
    inset: 0;
    border-radius: 50%;
  }

  /* Status dot */
  .status-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1.2rem;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s, box-shadow 0.3s;
  }
  .dot.running { background: var(--green); box-shadow: 0 0 10px var(--green); animation: blink 1s infinite; }
  .dot.paused { background: var(--amber); box-shadow: 0 0 10px var(--amber); }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .status-text {
    font-family: 'Courier Prime', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* Time display */
  .time-display { text-align: center; }

  .time-main {
    font-family: 'Courier Prime', monospace;
    font-size: clamp(2.8rem, 10vw, 4.2rem);
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--text);
    line-height: 1;
    transition: color 0.3s;
    text-shadow: 0 0 30px rgba(240,160,48,0.1);
  }

  .time-main.running { color: #fff; text-shadow: 0 0 20px rgba(240,160,48,0.3); }

  .time-ms {
    font-family: 'Courier Prime', monospace;
    font-size: clamp(1.2rem, 4vw, 1.7rem);
    color: var(--amber);
    letter-spacing: 0.06em;
    margin-top: 0.2rem;
    opacity: 0.75;
  }

  /* ── CONTROLS ── */
  .controls {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 1rem;
    align-items: center;
    justify-content: center;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }

  .ctrl-btn {
    font-family: 'Josefin Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    outline: none;
  }

  .ctrl-btn:active { transform: scale(0.95); }

  .btn-main {
    width: 100px; height: 100px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, rgba(240,160,48,0.3), rgba(240,160,48,0.1));
    border: 1.5px solid var(--amber);
    color: var(--amber);
    font-size: 0.72rem;
    box-shadow: 0 0 20px rgba(240,160,48,0.15), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .btn-main:hover {
    background: radial-gradient(circle at 40% 35%, rgba(240,160,48,0.5), rgba(240,160,48,0.2));
    box-shadow: 0 0 30px rgba(240,160,48,0.3);
  }

  .btn-main.pause-mode {
    border-color: var(--amber-dim);
    color: var(--amber-dim);
  }

  .btn-round {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--muted);
  }

  .btn-round:hover:not(:disabled) {
    border-color: rgba(255,255,255,0.2);
    color: var(--text);
  }

  .btn-round:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-round.btn-reset { border-color: rgba(224,85,64,0.25); color: var(--red); }
  .btn-round.btn-reset:hover { background: rgba(224,85,64,0.08); border-color: var(--red); }

  /* ── LAPS TABLE ── */
  .laps-wrap {
    position: relative;
    z-index: 1;
    width: min(420px, 94vw);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .laps-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.4rem;
    border-bottom: 1px solid var(--border);
  }

  .laps-title {
    font-family: 'Courier Prime', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .lap-pill {
    font-family: 'Courier Prime', monospace;
    font-size: 0.72rem;
    color: var(--amber);
    background: rgba(240,160,48,0.08);
    border: 1px solid rgba(240,160,48,0.15);
    padding: 0.15rem 0.6rem;
    border-radius: 99px;
  }

  .laps-body {
    max-height: 250px;
    overflow-y: auto;
  }

  .laps-body::-webkit-scrollbar { width: 3px; }
  .laps-body::-webkit-scrollbar-track { background: transparent; }
  .laps-body::-webkit-scrollbar-thumb { background: rgba(240,160,48,0.2); border-radius: 2px; }

  .lap-empty {
    padding: 2.5rem;
    text-align: center;
    font-size: 0.82rem;
    color: var(--muted);
  }

  .lap-row {
    display: grid;
    grid-template-columns: 2rem 1fr auto auto;
    align-items: center;
    gap: 0.8rem;
    padding: 0.8rem 1.4rem;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    animation: lapSlide 0.3s ease;
    transition: background 0.2s;
  }

  .lap-row:hover { background: rgba(255,255,255,0.02); }

  @keyframes lapSlide {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: none; }
  }

  .lap-n {
    font-family: 'Courier Prime', monospace;
    font-size: 0.72rem;
    color: var(--muted);
  }

  .lap-bar-track {
    height: 2px;
    background: rgba(255,255,255,0.05);
    border-radius: 1px;
    overflow: hidden;
  }

  .lap-bar-fill {
    height: 100%;
    border-radius: 1px;
    background: var(--amber);
    transition: width 0.4s;
  }

  .lap-row.fastest .lap-bar-fill { background: var(--green); }
  .lap-row.slowest .lap-bar-fill { background: var(--red); }

  .lap-split {
    font-family: 'Courier Prime', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    white-space: nowrap;
  }

  .lap-total {
    font-family: 'Courier Prime', monospace;
    font-size: 0.82rem;
    color: var(--text);
    white-space: nowrap;
    text-align: right;
  }

  .lap-row.fastest .lap-total { color: var(--green); }
  .lap-row.slowest .lap-total { color: var(--red); }

  .badge {
    font-size: 0.55rem;
    letter-spacing: 0.08em;
    padding: 0.1rem 0.35rem;
    border-radius: 3px;
    text-transform: uppercase;
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 600;
  }

  .badge-best { background: rgba(76,175,122,0.12); color: var(--green); }
  .badge-slow { background: rgba(224,85,64,0.12); color: var(--red); }

  .keyboard-hint {
    position: relative;
    z-index: 1;
    margin-top: 1.5rem;
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .hint-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .kbd {
    font-family: 'Courier Prime', monospace;
    font-size: 0.6rem;
    color: var(--amber);
    border: 1px solid rgba(240,160,48,0.25);
    padding: 0.15rem 0.45rem;
    border-radius: 3px;
    background: rgba(240,160,48,0.05);
  }

  .hint-label {
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  @media (max-width: 480px) {
    .dial-panel { width: 92vw; }
    .btn-main { width: 84px; height: 84px; font-size: 0.66rem; }
    .btn-round { width: 56px; height: 56px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-eyebrow">Precision Timer</div>
  <h1>Stopwatch</h1>
</header>

<!-- DIAL -->
<div class="dial-panel">
  <div class="dial-ring"></div>
  <svg class="arc-svg" viewBox="0 0 440 440">
    <circle class="arc-track" cx="220" cy="220" r="216"/>
    <circle class="arc-fill" cx="220" cy="220" r="216" id="arcFill"/>
  </svg>

  <div class="status-row">
    <div class="dot" id="dot"></div>
    <div class="status-text" id="statusText">Ready</div>
  </div>

  <div class="time-display">
    <div class="time-main" id="timeMain">00:00:00</div>
    <div class="time-ms" id="timeMs">.000</div>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <button class="ctrl-btn btn-round btn-reset" onclick="reset()">Reset</button>
  <button class="ctrl-btn btn-main" id="mainBtn" onclick="startStop()">Start</button>
  <button class="ctrl-btn btn-round" id="lapBtn" onclick="recordLap()" disabled>Lap</button>
</div>

<!-- LAPS -->
<div class="laps-wrap">
  <div class="laps-head">
    <div class="laps-title">Lap Times</div>
    <div class="lap-pill" id="lapCount">0 laps</div>
  </div>
  <div class="laps-body" id="lapsBody">
    <div class="lap-empty" id="lapEmpty">No laps recorded yet</div>
  </div>
</div>

<!-- KEYBOARD HINTS -->
<div class="keyboard-hint">
  <div class="hint-item"><span class="kbd">Space</span><span class="hint-label">Start / Pause</span></div>
  <div class="hint-item"><span class="kbd">L</span><span class="hint-label">Lap</span></div>
  <div class="hint-item"><span class="kbd">R</span><span class="hint-label">Reset</span></div>
</div>

<script>
  let startTime = 0, elapsed = 0, running = false, rafId = null;
  let lapTimes = [], lastLapTime = 0;

  const timeMain = document.getElementById('timeMain');
  const timeMs = document.getElementById('timeMs');
  const mainBtn = document.getElementById('mainBtn');
  const lapBtn = document.getElementById('lapBtn');
  const dot = document.getElementById('dot');
  const statusText = document.getElementById('statusText');
  const lapsBody = document.getElementById('lapsBody');
  const lapCount = document.getElementById('lapCount');
  const lapEmpty = document.getElementById('lapEmpty');
  const arcFill = document.getElementById('arcFill');

  const circumference = 2 * Math.PI * 216;
  arcFill.style.strokeDasharray = circumference;
  arcFill.style.strokeDashoffset = circumference;

  function pad(n) { return String(n).padStart(2,'0'); }

  function format(ms) {
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    return { main: `${pad(h)}:${pad(m)}:${pad(s)}`, ms: `.${String(ms % 1000).padStart(3,'0')}` };
  }

  function tick() {
    elapsed = Date.now() - startTime;
    const t = format(elapsed);
    timeMain.textContent = t.main;
    timeMs.textContent = t.ms;
    const secs = (elapsed / 1000) % 60;
    arcFill.style.strokeDashoffset = circumference - (circumference * secs / 60);
    rafId = requestAnimationFrame(tick);
  }

  function startStop() {
    if (!running) {
      startTime = Date.now() - elapsed;
      running = true;
      mainBtn.textContent = 'Pause';
      mainBtn.classList.add('pause-mode');
      lapBtn.disabled = false;
      dot.className = 'dot running';
      statusText.textContent = 'Running';
      timeMain.classList.add('running');
      rafId = requestAnimationFrame(tick);
    } else {
      running = false;
      cancelAnimationFrame(rafId);
      mainBtn.textContent = 'Resume';
      mainBtn.classList.remove('pause-mode');
      lapBtn.disabled = true;
      dot.className = 'dot paused';
      statusText.textContent = 'Paused';
      timeMain.classList.remove('running');
    }
  }

  function reset() {
    running = false;
    cancelAnimationFrame(rafId);
    elapsed = 0; lastLapTime = 0; lapTimes = [];
    timeMain.textContent = '00:00:00';
    timeMs.textContent = '.000';
    timeMain.classList.remove('running');
    mainBtn.textContent = 'Start';
    mainBtn.classList.remove('pause-mode');
    lapBtn.disabled = true;
    dot.className = 'dot';
    statusText.textContent = 'Ready';
    arcFill.style.strokeDashoffset = circumference;
    lapsBody.innerHTML = '';
    lapsBody.appendChild(lapEmpty);
    lapEmpty.style.display = 'block';
    lapCount.textContent = '0 laps';
  }

  function recordLap() {
    if (!running) return;
    const lapTime = elapsed - lastLapTime;
    lapTimes.push({ total: elapsed, split: lapTime });
    lastLapTime = elapsed;
    renderLaps();
  }

  function renderLaps() {
    lapEmpty.style.display = 'none';
    lapCount.textContent = `${lapTimes.length} lap${lapTimes.length !== 1 ? 's' : ''}`;
    const splits = lapTimes.map(l => l.split);
    const minS = Math.min(...splits), maxS = Math.max(...splits), maxSV = Math.max(...splits);
    lapsBody.innerHTML = '';
    [...lapTimes].reverse().forEach((lap, i) => {
      const realIdx = lapTimes.length - i;
      const isFastest = splits.length > 1 && lap.split === minS;
      const isSlowest = splits.length > 1 && lap.split === maxS;
      const bw = maxSV > 0 ? (lap.split / maxSV * 100) : 0;
      const t = format(lap.total), s = format(lap.split);
      const row = document.createElement('div');
      row.className = `lap-row${isFastest ? ' fastest' : ''}${isSlowest ? ' slowest' : ''}`;
      row.innerHTML = `
        <div class="lap-n">${String(realIdx).padStart(2,'0')}</div>
        <div class="lap-bar-track"><div class="lap-bar-fill" style="width:${bw}%"></div></div>
        <div style="display:flex;align-items:center;gap:0.4rem">
          ${isFastest ? '<span class="badge badge-best">Best</span>' : ''}
          ${isSlowest ? '<span class="badge badge-slow">Slow</span>' : ''}
          <div class="lap-split">${s.main}${s.ms}</div>
        </div>
        <div class="lap-total">${t.main}${t.ms}</div>
      `;
      lapsBody.appendChild(row);
    });
  }

  document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); startStop(); }
    if (e.code === 'KeyL' && running) recordLap();
    if (e.code === 'KeyR') reset();
  });
</script>
</body>
</html>
